<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygon Art Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: #242424;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar h1 {
    font-size: 18px;
    color: #b9cf3d;
    border-bottom: 1px solid #444;
    padding-bottom: 10px;
  }
  .section {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 14px;
  }
  .section h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    margin-bottom: 10px;
  }
  label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
    color: #ccc;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #b9cf3d;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 14px;
    resize: vertical;
  }
  textarea { min-height: 60px; }
  input[type="file"] { display: none; }
  .btn {
    display: inline-block;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .btn-primary {
    background: #b9cf3d;
    color: #1a1a1a;
  }
  .btn-primary:hover { background: #a8be2c; }
  .btn-secondary {
    background: #444;
    color: #e0e0e0;
  }
  .btn-secondary:hover { background: #555; }
  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .range-row {
    margin-bottom: 10px;
  }
  .range-row .range-value {
    float: right;
    font-size: 12px;
    color: #b9cf3d;
  }
  .color-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  .color-chip {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 2px solid #555;
    cursor: pointer;
    position: relative;
  }
  .color-chip:hover { border-color: #b9cf3d; }
  .color-chip .remove {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 14px;
    height: 14px;
    background: #e44;
    color: #fff;
    border-radius: 50%;
    font-size: 10px;
    line-height: 14px;
    text-align: center;
    display: none;
    cursor: pointer;
  }
  .color-chip:hover .remove { display: block; }
  .add-color-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 2px dashed #666;
    background: transparent;
    color: #999;
    font-size: 18px;
    line-height: 24px;
    text-align: center;
    cursor: pointer;
  }
  .add-color-btn:hover { border-color: #b9cf3d; color: #b9cf3d; }

  select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 13px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .checkbox-row input[type="checkbox"] {
    accent-color: #b9cf3d;
  }

  /* --- Main area --- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .toolbar {
    padding: 10px 20px;
    background: #242424;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .preview-wrap {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    background-image:
      linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
      linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  }
  #previewCanvas {
    max-width: 95%;
    max-height: 95%;
    image-rendering: auto;
  }
  .hidden-input { position: absolute; left: -9999px; }
</style>
</head>
<body>

<!-- Sidebar Controls -->
<div class="sidebar">
  <h1>Polygon Art Generator</h1>

  <!-- Input source -->
  <div class="section">
    <h2>Input</h2>
    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn btn-primary" id="btnUpload">Upload Image</button>
      <input type="file" id="fileInput" accept="image/*">
      <button class="btn btn-secondary" id="btnUseText">Use Text</button>
    </div>
    <label for="textInput">Text input:</label>
    <textarea id="textInput" placeholder="Type text here...">HELLO</textarea>
    <div class="range-row" style="margin-top:8px;">
      <label>Text font size: <span class="range-value" id="fontSizeVal">120</span>px</label>
      <input type="range" id="fontSize" min="20" max="400" value="120">
    </div>
    <label for="fontSelect" style="margin-top:4px;">Font:</label>
    <select id="fontSelect">
      <option value="Arial Black">Arial Black</option>
      <option value="Impact">Impact</option>
      <option value="Georgia">Georgia</option>
      <option value="Courier New">Courier New</option>
      <option value="Verdana">Verdana</option>
      <option value="Times New Roman">Times New Roman</option>
    </select>
    <div class="range-row" style="margin-top:8px;">
      <label>Threshold (black/white): <span class="range-value" id="thresholdVal">128</span></label>
      <input type="range" id="threshold" min="1" max="255" value="128">
    </div>
    <div class="checkbox-row" style="margin-top:4px;">
      <input type="checkbox" id="invertInput">
      <label for="invertInput" style="margin:0;">Invert input</label>
    </div>
  </div>

  <!-- Polygon settings -->
  <div class="section">
    <h2>Polygon Shape</h2>
    <label for="polyShape">Shape:</label>
    <select id="polyShape">
      <option value="hollow">Hollow hexagon (hohl)</option>
      <option value="filled" selected>Filled hexagon (Frenzelit)</option>
    </select>
    <div class="range-row" style="margin-top:10px;">
      <label>Polygon size: <span class="range-value" id="polySizeVal">24</span>px</label>
      <input type="range" id="polySize" min="6" max="80" value="24">
    </div>
  </div>

  <!-- Padding -->
  <div class="section">
    <h2>Spacing</h2>
    <div class="range-row">
      <label>Normal padding: <span class="range-value" id="paddingVal">2</span>px</label>
      <input type="range" id="padding" min="0" max="30" value="2">
    </div>
    <div class="range-row">
      <label>Highlight extra padding: <span class="range-value" id="highlightPaddingVal">4</span>px</label>
      <input type="range" id="highlightPadding" min="0" max="30" value="4">
    </div>
  </div>

  <!-- Colors -->
  <div class="section">
    <h2>Normal Pattern Colors</h2>
    <div class="color-list" id="normalColors"></div>
  </div>
  <div class="section">
    <h2>Highlight Colors</h2>
    <div class="color-list" id="highlightColors"></div>
  </div>

  <!-- Background -->
  <div class="section">
    <h2>Background</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="transparentBg" checked>
      <label for="transparentBg" style="margin:0;">Transparent</label>
    </div>
    <label for="bgColor" style="margin-top:4px;">Background color:</label>
    <input type="color" id="bgColor" value="#1a1a1a" style="width:100%;height:30px;border:1px solid #444;border-radius:4px;cursor:pointer;">
  </div>

  <!-- Output -->
  <div class="section">
    <h2>Output</h2>
    <div class="range-row">
      <label>Output scale: <span class="range-value" id="scaleVal">1</span>x</label>
      <input type="range" id="outputScale" min="1" max="4" value="1" step="1">
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-primary" id="btnExport">Export PNG</button>
    </div>
  </div>
</div>

<!-- Main preview area -->
<div class="main">
  <div class="toolbar">
    <button class="btn btn-primary" id="btnGenerate">Generate</button>
    <span style="font-size:12px;color:#888;" id="statusText">Ready</span>
  </div>
  <div class="preview-wrap">
    <canvas id="previewCanvas" width="800" height="600"></canvas>
  </div>
</div>

<!-- Hidden color picker -->
<input type="color" id="hiddenColorPicker" class="hidden-input">

<!-- Hidden canvas for source image processing -->
<canvas id="sourceCanvas" style="display:none;"></canvas>

<script>
(function() {
  // ---- Polygon geometry ----
  // Flat-top regular hexagon unit points (radius=1, centered at 0,0)
  function hexPoints(cx, cy, r) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 180 * (60 * i);
      pts.push([cx + r * Math.cos(angle), cy + r * Math.sin(angle)]);
    }
    return pts;
  }

  // Filled hexagon path (Frenzelit style - rounded hex with bezier curves)
  // Derived from the SVG path, normalized to unit coordinates
  function drawFilledHex(ctx, cx, cy, r) {
    const pts = hexPoints(cx, cy, r);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < 6; i++) {
      ctx.lineTo(pts[i][0], pts[i][1]);
    }
    ctx.closePath();
    ctx.fill();
  }

  // Hollow hexagon (hohl style - stroke only)
  function drawHollowHex(ctx, cx, cy, r, lineWidth) {
    const pts = hexPoints(cx, cy, r);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < 6; i++) {
      ctx.lineTo(pts[i][0], pts[i][1]);
    }
    ctx.closePath();
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // ---- State ----
  let normalColorList = ['#b9cf3d', '#b3a7d2', '#2f2b2a'];
  let highlightColorList = ['#b9cf3d', '#ffffff'];
  let sourceImage = null; // ImageData from uploaded or text-rendered image
  let inputMode = 'text'; // 'text' or 'image'

  // ---- DOM refs ----
  const fileInput = document.getElementById('fileInput');
  const btnUpload = document.getElementById('btnUpload');
  const btnUseText = document.getElementById('btnUseText');
  const textInput = document.getElementById('textInput');
  const fontSizeSlider = document.getElementById('fontSize');
  const fontSizeVal = document.getElementById('fontSizeVal');
  const fontSelect = document.getElementById('fontSelect');
  const thresholdSlider = document.getElementById('threshold');
  const thresholdVal = document.getElementById('thresholdVal');
  const invertInput = document.getElementById('invertInput');
  const polyShapeSelect = document.getElementById('polyShape');
  const polySizeSlider = document.getElementById('polySize');
  const polySizeVal = document.getElementById('polySizeVal');
  const paddingSlider = document.getElementById('padding');
  const paddingVal = document.getElementById('paddingVal');
  const highlightPaddingSlider = document.getElementById('highlightPadding');
  const highlightPaddingVal = document.getElementById('highlightPaddingVal');
  const transparentBg = document.getElementById('transparentBg');
  const bgColorInput = document.getElementById('bgColor');
  const outputScaleSlider = document.getElementById('outputScale');
  const scaleVal = document.getElementById('scaleVal');
  const btnGenerate = document.getElementById('btnGenerate');
  const btnExport = document.getElementById('btnExport');
  const previewCanvas = document.getElementById('previewCanvas');
  const sourceCanvas = document.getElementById('sourceCanvas');
  const statusText = document.getElementById('statusText');
  const normalColorsEl = document.getElementById('normalColors');
  const highlightColorsEl = document.getElementById('highlightColors');
  const hiddenColorPicker = document.getElementById('hiddenColorPicker');

  // ---- Color palette UI ----
  function renderColorList(container, colors, listName) {
    container.innerHTML = '';
    colors.forEach((c, i) => {
      const chip = document.createElement('div');
      chip.className = 'color-chip';
      chip.style.background = c;
      chip.title = c;

      const rm = document.createElement('span');
      rm.className = 'remove';
      rm.textContent = '\u00d7';
      rm.addEventListener('click', (e) => {
        e.stopPropagation();
        colors.splice(i, 1);
        renderColorList(container, colors, listName);
      });
      chip.appendChild(rm);

      chip.addEventListener('click', () => {
        hiddenColorPicker.value = c;
        hiddenColorPicker.onchange = () => {
          colors[i] = hiddenColorPicker.value;
          renderColorList(container, colors, listName);
        };
        hiddenColorPicker.click();
      });

      container.appendChild(chip);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-color-btn';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', () => {
      hiddenColorPicker.value = '#ffffff';
      hiddenColorPicker.onchange = () => {
        colors.push(hiddenColorPicker.value);
        renderColorList(container, colors, listName);
      };
      hiddenColorPicker.click();
    });
    container.appendChild(addBtn);
  }

  renderColorList(normalColorsEl, normalColorList, 'normal');
  renderColorList(highlightColorsEl, highlightColorList, 'highlight');

  // ---- Slider value displays ----
  function bindSlider(slider, display, suffix) {
    slider.addEventListener('input', () => { display.textContent = slider.value; });
  }
  bindSlider(fontSizeSlider, fontSizeVal);
  bindSlider(thresholdSlider, thresholdVal);
  bindSlider(polySizeSlider, polySizeVal);
  bindSlider(paddingSlider, paddingVal);
  bindSlider(highlightPaddingSlider, highlightPaddingVal);
  bindSlider(outputScaleSlider, scaleVal);

  // ---- Input handling ----
  btnUpload.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    inputMode = 'image';
    const img = new Image();
    img.onload = () => {
      sourceCanvas.width = img.width;
      sourceCanvas.height = img.height;
      const ctx = sourceCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      sourceImage = ctx.getImageData(0, 0, img.width, img.height);
      statusText.textContent = 'Image loaded: ' + img.width + 'x' + img.height;
      generate();
    };
    img.src = URL.createObjectURL(file);
  });

  btnUseText.addEventListener('click', () => {
    inputMode = 'text';
    renderTextSource();
    generate();
  });

  function renderTextSource() {
    const text = textInput.value || 'HELLO';
    const fontSize = parseInt(fontSizeSlider.value);
    const font = fontSelect.value;
    const ctx = sourceCanvas.getContext('2d');

    ctx.font = fontSize + 'px "' + font + '"';
    const lines = text.split('\n');
    const lineHeight = fontSize * 1.2;
    let maxWidth = 0;
    lines.forEach(line => {
      const m = ctx.measureText(line);
      if (m.width > maxWidth) maxWidth = m.width;
    });

    const pad = fontSize * 0.3;
    const w = Math.ceil(maxWidth + pad * 2);
    const h = Math.ceil(lines.length * lineHeight + pad * 2);
    sourceCanvas.width = w;
    sourceCanvas.height = h;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#000000';
    ctx.font = fontSize + 'px "' + font + '"';
    ctx.textBaseline = 'top';
    lines.forEach((line, i) => {
      ctx.fillText(line, pad, pad + i * lineHeight);
    });

    sourceImage = ctx.getImageData(0, 0, w, h);
    statusText.textContent = 'Text rendered: ' + w + 'x' + h;
  }

  // ---- Sampling ----
  function isHighlighted(imgData, x, y, threshold, invert) {
    if (x < 0 || y < 0 || x >= imgData.width || y >= imgData.height) return false;
    const ix = Math.floor(x);
    const iy = Math.floor(y);
    const idx = (iy * imgData.width + ix) * 4;
    const r = imgData.data[idx];
    const g = imgData.data[idx + 1];
    const b = imgData.data[idx + 2];
    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
    const dark = gray < threshold;
    return invert ? !dark : dark;
  }

  // ---- Main generation ----
  function generate(scale) {
    if (!sourceImage) {
      if (inputMode === 'text') {
        renderTextSource();
      }
      if (!sourceImage) return;
    }

    scale = scale || 1;
    const polySize = parseInt(polySizeSlider.value);
    const padding = parseInt(paddingSlider.value);
    const highlightPadding = parseInt(highlightPaddingSlider.value);
    const threshold = parseInt(thresholdSlider.value);
    const invert = invertInput.checked;
    const shape = polyShapeSelect.value;
    const isTransparent = transparentBg.checked;
    const bgColor = bgColorInput.value;

    const srcW = sourceImage.width;
    const srcH = sourceImage.height;

    // Hex grid geometry (flat-top hexagons)
    const r = polySize; // radius (center to vertex)
    const hexW = r * 2;                    // width of one hex
    const hexH = r * Math.sqrt(3);         // height of one hex
    const colStep = hexW * 0.75 + padding; // horizontal step between columns
    const rowStep = hexH + padding;        // vertical step between rows

    // Determine how many columns and rows we need to cover the source image
    const cols = Math.ceil(srcW / colStep) + 1;
    const rows = Math.ceil(srcH / (rowStep)) + 2;

    // Output canvas size
    const outW = Math.ceil(cols * colStep + r * 0.5);
    const outH = Math.ceil(rows * rowStep + hexH * 0.5);

    const canvas = (scale === 1) ? previewCanvas : document.createElement('canvas');
    canvas.width = outW * scale;
    canvas.height = outH * scale;
    const ctx = canvas.getContext('2d');

    if (scale !== 1) ctx.scale(scale, scale);

    // Background
    if (!isTransparent) {
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, outW, outH);
    }

    // Scale factors from output grid back to source image
    const scaleX = srcW / (cols * colStep);
    const scaleY = srcH / (rows * rowStep);

    // Seeded random for consistent color assignment
    let seed = 42;
    function seededRandom() {
      seed = (seed * 16807 + 0) % 2147483647;
      return (seed - 1) / 2147483646;
    }

    const hollowLineWidth = Math.max(1, r * 0.18);

    for (let col = 0; col < cols; col++) {
      for (let row = 0; row < rows; row++) {
        // Hex center position
        const cx = r + col * colStep;
        const cy = hexH / 2 + row * rowStep + (col % 2 === 1 ? rowStep / 2 : 0);

        // Map to source image coordinates
        const srcX = cx * scaleX;
        const srcY = cy * scaleY;

        const highlighted = isHighlighted(sourceImage, srcX, srcY, threshold, invert);

        // Choose color
        const colorPool = highlighted ? highlightColorList : normalColorList;
        if (colorPool.length === 0) continue;
        const color = colorPool[Math.floor(seededRandom() * colorPool.length)];

        // Calculate effective radius (shrink for padding)
        const extraPad = highlighted ? highlightPadding : 0;
        const effectiveR = Math.max(2, r - extraPad / 2);

        ctx.save();
        if (shape === 'filled') {
          ctx.fillStyle = color;
          drawFilledHex(ctx, cx, cy, effectiveR);
        } else {
          ctx.strokeStyle = color;
          drawHollowHex(ctx, cx, cy, effectiveR, hollowLineWidth);
        }
        ctx.restore();
      }
    }

    if (scale === 1) {
      statusText.textContent = 'Generated: ' + outW + 'x' + outH + ' (' + cols + 'x' + rows + ' hexagons)';
    }
    return canvas;
  }

  // ---- Auto-generate on control changes ----
  const autoGenControls = [
    thresholdSlider, invertInput, polyShapeSelect, polySizeSlider,
    paddingSlider, highlightPaddingSlider, transparentBg, bgColorInput
  ];
  autoGenControls.forEach(el => {
    el.addEventListener('input', () => generate());
    el.addEventListener('change', () => generate());
  });

  btnGenerate.addEventListener('click', () => {
    if (inputMode === 'text') renderTextSource();
    generate();
  });

  // ---- Export ----
  btnExport.addEventListener('click', () => {
    if (!sourceImage) {
      if (inputMode === 'text') renderTextSource();
      if (!sourceImage) return;
    }
    const scale = parseInt(outputScaleSlider.value);
    const exportCanvas = generate(scale);
    const link = document.createElement('a');
    link.download = 'polygon-art.png';
    link.href = (scale === 1 ? previewCanvas : exportCanvas).toDataURL('image/png');
    link.click();
    statusText.textContent = 'Exported at ' + scale + 'x scale';
  });

  // ---- Initial render ----
  inputMode = 'text';
  renderTextSource();
  generate();
})();
</script>
</body>
</html>
