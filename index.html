<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygon Art Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar {
    width: 340px;
    min-width: 340px;
    background: #242424;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar h1 {
    font-size: 18px;
    color: #b9cf3d;
    border-bottom: 1px solid #444;
    padding-bottom: 10px;
  }
  .section {
    background: #2a2a2a;
    border-radius: 8px;
    padding: 14px;
  }
  .section h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    margin-bottom: 10px;
  }
  label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
    color: #ccc;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #b9cf3d;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 14px;
    resize: vertical;
  }
  input[type="number"] {
    width: 70px;
    padding: 4px 6px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 13px;
  }
  textarea { min-height: 50px; }
  input[type="file"] { display: none; }
  .btn {
    display: inline-block;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .btn-primary { background: #b9cf3d; color: #1a1a1a; }
  .btn-primary:hover { background: #a8be2c; }
  .btn-secondary { background: #444; color: #e0e0e0; }
  .btn-secondary:hover { background: #555; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .range-row { margin-bottom: 10px; }
  .range-row .range-value { float: right; font-size: 12px; color: #b9cf3d; }
  .color-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; align-items: center; }
  .color-chip {
    width: 28px; height: 28px; border-radius: 4px;
    border: 2px solid #555; cursor: pointer; position: relative;
  }
  .color-chip:hover { border-color: #b9cf3d; }
  .color-chip .remove {
    position: absolute; top: -6px; right: -6px;
    width: 14px; height: 14px; background: #e44; color: #fff;
    border-radius: 50%; font-size: 10px; line-height: 14px;
    text-align: center; display: none; cursor: pointer;
  }
  .color-chip:hover .remove { display: block; }
  .add-color-btn {
    width: 28px; height: 28px; border-radius: 4px;
    border: 2px dashed #666; background: transparent;
    color: #999; font-size: 18px; line-height: 24px;
    text-align: center; cursor: pointer;
  }
  .add-color-btn:hover { border-color: #b9cf3d; color: #b9cf3d; }
  select {
    width: 100%; padding: 6px 8px; border: 1px solid #444;
    border-radius: 4px; background: #1a1a1a; color: #e0e0e0;
    font-size: 13px; margin-bottom: 6px;
  }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .checkbox-row input[type="checkbox"] { accent-color: #b9cf3d; }
  .inline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .inline-row label { margin: 0; white-space: nowrap; }
  .inline-row .x-sep { color: #666; font-size: 14px; }
  .pos-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .pos-row label { margin: 0; min-width: 14px; }
  .pos-row input[type="number"] { width: 60px; }

  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .toolbar {
    padding: 10px 20px; background: #242424;
    border-bottom: 1px solid #333;
    display: flex; align-items: center; gap: 12px;
  }
  .preview-wrap {
    flex: 1; overflow: auto;
    display: flex; align-items: center; justify-content: center;
    background: #111;
    background-image:
      linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
      linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    position: relative;
  }
  #previewCanvas {
    max-width: 95%; max-height: 95%; image-rendering: auto;
    cursor: grab;
  }
  #previewCanvas:active { cursor: grabbing; }
  .drag-hint {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; color: #666; pointer-events: none;
  }
</style>
</head>
<body>

<div class="sidebar">
  <h1>Polygon Art Generator</h1>

  <!-- Image layer -->
  <div class="section">
    <h2>Image Layer</h2>
    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn btn-primary btn-sm" id="btnUpload">Upload Image</button>
      <input type="file" id="fileInput" accept="image/*">
      <button class="btn btn-secondary btn-sm" id="btnClearImage">Clear</button>
    </div>
    <div id="imageControls" style="display:none;">
      <div class="pos-row">
        <label>X:</label>
        <input type="number" id="imgOffX" value="0">
        <label>Y:</label>
        <input type="number" id="imgOffY" value="0">
      </div>
      <div class="range-row">
        <label>Image scale: <span class="range-value" id="imgScaleVal">100</span>%</label>
        <input type="range" id="imgScale" min="10" max="400" value="100">
      </div>
      <span style="font-size:11px;color:#666;">Drag on the preview to reposition</span>
    </div>
  </div>

  <!-- Text layer -->
  <div class="section">
    <h2>Text Layer</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="textLayerEnabled" checked>
      <label for="textLayerEnabled" style="margin:0;">Enabled</label>
    </div>
    <label for="textLayerInput">Text:</label>
    <textarea id="textLayerInput" placeholder="Type text here...">HELLO</textarea>
    <div class="pos-row" style="margin-top:6px;">
      <label>X:</label>
      <input type="number" id="textOffX" value="0">
      <label>Y:</label>
      <input type="number" id="textOffY" value="0">
    </div>
    <div class="range-row" style="margin-top:4px;">
      <label>Font size: <span class="range-value" id="textSizeVal">120</span>px</label>
      <input type="range" id="textSize" min="20" max="400" value="120">
    </div>
    <label for="textFont">Font:</label>
    <select id="textFont">
      <option value="Arial Black">Arial Black</option>
      <option value="Impact">Impact</option>
      <option value="Georgia">Georgia</option>
      <option value="Courier New">Courier New</option>
      <option value="Verdana">Verdana</option>
      <option value="Times New Roman">Times New Roman</option>
    </select>
  </div>

  <!-- Source settings -->
  <div class="section">
    <h2>Source Processing</h2>
    <div class="range-row">
      <label>Threshold: <span class="range-value" id="thresholdVal">128</span></label>
      <input type="range" id="threshold" min="1" max="255" value="128">
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="invertInput">
      <label for="invertInput" style="margin:0;">Invert</label>
    </div>
  </div>

  <!-- Resolution -->
  <div class="section">
    <h2>Resolution</h2>
    <label for="canvasShape">Canvas shape:</label>
    <select id="canvasShape">
      <option value="rect" selected>Rectangle</option>
      <option value="hexagon">Hexagon</option>
    </select>
    <div class="inline-row" style="margin-top:6px;">
      <label>Cols:</label>
      <input type="number" id="resCols" value="40" min="3" max="500">
      <span class="x-sep">x</span>
      <label>Rows:</label>
      <input type="number" id="resRows" value="20" min="3" max="500">
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="lockAspect" checked>
      <label for="lockAspect" style="margin:0;">Lock aspect ratio</label>
    </div>
  </div>

  <!-- Normal shape -->
  <div class="section">
    <h2>Normal Polygon Shape</h2>
    <select id="normalShape">
      <option value="filled">Filled (Frenzelit)</option>
      <option value="hollow">Hollow (hohl)</option>
      <option value="mixed" selected>Mixed</option>
    </select>
    <div class="range-row" style="margin-top:6px;" id="normalMixRow">
      <label>Filled ratio: <span class="range-value" id="normalMixVal">50</span>%</label>
      <input type="range" id="normalMix" min="0" max="100" value="50">
    </div>
  </div>

  <!-- Highlight shape -->
  <div class="section">
    <h2>Highlight Polygon Shape</h2>
    <select id="highlightShape">
      <option value="filled" selected>Filled (Frenzelit)</option>
      <option value="hollow">Hollow (hohl)</option>
      <option value="mixed">Mixed</option>
    </select>
    <div class="range-row" style="margin-top:6px;" id="highlightMixRow">
      <label>Filled ratio: <span class="range-value" id="highlightMixVal">50</span>%</label>
      <input type="range" id="highlightMix" min="0" max="100" value="50">
    </div>
  </div>

  <!-- Fade -->
  <div class="section">
    <h2>Pattern Fade</h2>
    <label for="fadeMode">Direction:</label>
    <select id="fadeMode">
      <option value="none" selected>None</option>
      <option value="content">From content outline</option>
      <option value="edges">Edges inward</option>
      <option value="radial">Radial (center out)</option>
      <option value="top">Top to bottom</option>
      <option value="bottom">Bottom to top</option>
      <option value="left">Left to right</option>
      <option value="right">Right to left</option>
    </select>
    <div class="range-row" style="margin-top:6px;">
      <label>Fade reach: <span class="range-value" id="fadeStrengthVal">50</span>%</label>
      <input type="range" id="fadeStrength" min="0" max="100" value="50">
    </div>
    <div class="range-row">
      <label>Fade curve: <span class="range-value" id="fadeCurveVal">1.0</span>x</label>
      <input type="range" id="fadeCurve" min="10" max="80" value="10">
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="fadeOnlyNormal" checked>
      <label for="fadeOnlyNormal" style="margin:0;">Only fade normal (keep highlights)</label>
    </div>
    <label for="fadeEffect">Effect:</label>
    <select id="fadeEffect">
      <option value="skip" selected>Remove polygons</option>
      <option value="shrink">Shrink polygons</option>
      <option value="opacity">Fade opacity</option>
    </select>
  </div>

  <!-- Spacing -->
  <div class="section">
    <h2>Spacing</h2>
    <div class="range-row">
      <label>Normal padding: <span class="range-value" id="paddingVal">2</span>px</label>
      <input type="range" id="padding" min="0" max="30" value="2">
    </div>
    <div class="range-row">
      <label>Highlight extra padding: <span class="range-value" id="highlightPaddingVal">4</span>px</label>
      <input type="range" id="highlightPadding" min="0" max="30" value="4">
    </div>
  </div>

  <!-- Colors -->
  <div class="section">
    <h2>Normal Pattern Colors</h2>
    <div class="color-list" id="normalColors"></div>
  </div>
  <div class="section">
    <h2>Highlight Colors</h2>
    <div class="color-list" id="highlightColors"></div>
  </div>

  <!-- Background -->
  <div class="section">
    <h2>Background</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="transparentBg" checked>
      <label for="transparentBg" style="margin:0;">Transparent</label>
    </div>
    <label for="bgColor" style="margin-top:4px;">Color:</label>
    <input type="color" id="bgColor" value="#1a1a1a" style="width:100%;height:28px;border:1px solid #444;border-radius:4px;cursor:pointer;">
  </div>

  <!-- Output -->
  <div class="section">
    <h2>Output</h2>
    <div class="range-row">
      <label>Export scale: <span class="range-value" id="scaleVal">1</span>x</label>
      <input type="range" id="outputScale" min="1" max="4" value="1" step="1">
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-primary" id="btnExport">Export PNG</button>
      <button class="btn btn-secondary" id="btnExportSvg">Export SVG</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <button class="btn btn-primary" id="btnGenerate">Generate</button>
    <span style="font-size:12px;color:#888;" id="statusText">Ready</span>
  </div>
  <div class="preview-wrap">
    <canvas id="previewCanvas" width="800" height="600"></canvas>
    <div class="drag-hint">Drag to move image layer</div>
  </div>
</div>

<canvas id="sourceCanvas" style="display:none;"></canvas>

<script>
(function() {
  // ---- Embedded SVG templates from repo ----
  const HOLLOW_SVG_TEMPLATE = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 403 459.9298">
  <defs><style>.c{fill:none;stroke:{{COLOR}};stroke-linecap:round;stroke-linejoin:round;stroke-width:35px;}</style></defs>
  <polygon class="c" points="385.5 336.19735 385.5 123.73245 201.5 17.5 17.5 123.73245 17.5 336.19735 201.5 442.4298 385.5 336.19735"/>
</svg>`;

  const FILLED_SVG_TEMPLATE = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 763.24 856.81">
  <defs><style>.c{fill:{{COLOR}};stroke:{{COLOR}};stroke-miterlimit:10;stroke-width:74px;}</style></defs>
  <path class="c" d="M374.2,39.66L47.34,225.23c-6.39,3.63-10.34,10.41-10.34,17.75v368.22c0,7.3,3.9,14.05,10.23,17.69l326.93,188.18c6.34,3.65,14.16,3.63,20.48-.06l321.48-187.75c6.27-3.66,10.12-10.37,10.12-17.63V245.3c0-7.26-3.85-13.97-10.12-17.63L394.58,39.79c-6.28-3.67-14.05-3.72-20.38-.13Z"/>
</svg>`;

  const FILLED_ASPECT = 763.24 / 856.81;

  // ---- SVG stamp cache ----
  const stampCache = new Map();

  function getStamp(type, color, w, h) {
    const key = type + '|' + color + '|' + w + '|' + h;
    if (stampCache.has(key)) return Promise.resolve(stampCache.get(key));
    const template = type === 'filled' ? FILLED_SVG_TEMPLATE : HOLLOW_SVG_TEMPLATE;
    const svgStr = template.replace(/\{\{COLOR\}\}/g, color);
    const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        stampCache.set(key, c);
        resolve(c);
      };
      img.onerror = () => {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        stampCache.set(key, c);
        resolve(c);
      };
      img.src = url;
    });
  }

  async function preloadStamps(types, colors, w, h) {
    const map = new Map();
    const promises = [];
    for (const t of types) {
      for (const c of colors) {
        promises.push(getStamp(t, c, w, h).then(s => map.set(t + '|' + c, s)));
      }
    }
    await Promise.all(promises);
    return map;
  }

  // ---- State ----
  let normalColorList = ['#b9cf3d', '#b3a7d2', '#2f2b2a'];
  let highlightColorList = ['#b9cf3d', '#ffffff'];
  let uploadedImg = null; // HTMLImageElement of uploaded image
  let sourceImage = null; // ImageData for sampling
  let generating = false;

  // ---- DOM refs ----
  const $ = id => document.getElementById(id);
  const fileInput = $('fileInput');
  const imageControls = $('imageControls');
  const imgOffXInput = $('imgOffX');
  const imgOffYInput = $('imgOffY');
  const imgScaleSlider = $('imgScale');
  const imgScaleVal = $('imgScaleVal');
  const textLayerEnabled = $('textLayerEnabled');
  const textLayerInput = $('textLayerInput');
  const textOffXInput = $('textOffX');
  const textOffYInput = $('textOffY');
  const textSizeSlider = $('textSize');
  const textSizeVal = $('textSizeVal');
  const textFontSelect = $('textFont');
  const thresholdSlider = $('threshold');
  const thresholdValEl = $('thresholdVal');
  const invertInput = $('invertInput');
  const canvasShapeSelect = $('canvasShape');
  const resColsInput = $('resCols');
  const resRowsInput = $('resRows');
  const lockAspectCheck = $('lockAspect');
  const normalShapeSelect = $('normalShape');
  const normalMixSlider = $('normalMix');
  const normalMixValEl = $('normalMixVal');
  const normalMixRow = $('normalMixRow');
  const highlightShapeSelect = $('highlightShape');
  const highlightMixSlider = $('highlightMix');
  const highlightMixValEl = $('highlightMixVal');
  const highlightMixRow = $('highlightMixRow');
  const fadeModeSelect = $('fadeMode');
  const fadeStrengthSlider = $('fadeStrength');
  const fadeStrengthValEl = $('fadeStrengthVal');
  const fadeCurveSlider = $('fadeCurve');
  const fadeCurveValEl = $('fadeCurveVal');
  const fadeEffectSelect = $('fadeEffect');
  const fadeOnlyNormalCheck = $('fadeOnlyNormal');
  const paddingSlider = $('padding');
  const paddingValEl = $('paddingVal');
  const highlightPaddingSlider = $('highlightPadding');
  const highlightPaddingValEl = $('highlightPaddingVal');
  const transparentBg = $('transparentBg');
  const bgColorInput = $('bgColor');
  const outputScaleSlider = $('outputScale');
  const scaleValEl = $('scaleVal');
  const previewCanvas = $('previewCanvas');
  const sourceCanvas = $('sourceCanvas');
  const statusText = $('statusText');
  const normalColorsEl = $('normalColors');
  const highlightColorsEl = $('highlightColors');

  // ---- Mix row visibility ----
  function updateMixVis() {
    normalMixRow.style.display = normalShapeSelect.value === 'mixed' ? '' : 'none';
    highlightMixRow.style.display = highlightShapeSelect.value === 'mixed' ? '' : 'none';
  }
  normalShapeSelect.addEventListener('change', updateMixVis);
  highlightShapeSelect.addEventListener('change', updateMixVis);
  updateMixVis();

  // ---- Color picker ----
  function openColorPicker(initial, cb) {
    const p = document.createElement('input');
    p.type = 'color';
    p.style.cssText = 'position:absolute;left:-9999px';
    p.value = initial;
    document.body.appendChild(p);
    p.addEventListener('input', function h() { cb(p.value); p.removeEventListener('input', h); p.remove(); });
    p.click();
  }

  function renderColorList(container, colors) {
    container.innerHTML = '';
    colors.forEach((c, i) => {
      const chip = document.createElement('div');
      chip.className = 'color-chip';
      chip.style.background = c;
      chip.title = c;
      const rm = document.createElement('span');
      rm.className = 'remove';
      rm.textContent = '\u00d7';
      rm.addEventListener('click', e => { e.stopPropagation(); colors.splice(i, 1); renderColorList(container, colors); });
      chip.appendChild(rm);
      chip.addEventListener('click', () => openColorPicker(c, v => { colors[i] = v; renderColorList(container, colors); }));
      container.appendChild(chip);
    });
    const add = document.createElement('button');
    add.className = 'add-color-btn';
    add.textContent = '+';
    add.addEventListener('click', () => openColorPicker('#b9cf3d', v => { colors.push(v); renderColorList(container, colors); }));
    container.appendChild(add);
  }
  renderColorList(normalColorsEl, normalColorList);
  renderColorList(highlightColorsEl, highlightColorList);

  // ---- Slider bindings ----
  function bindSlider(s, d) { s.addEventListener('input', () => d.textContent = s.value); }
  bindSlider(imgScaleSlider, imgScaleVal);
  bindSlider(textSizeSlider, textSizeVal);
  bindSlider(thresholdSlider, thresholdValEl);
  bindSlider(paddingSlider, paddingValEl);
  bindSlider(highlightPaddingSlider, highlightPaddingValEl);
  bindSlider(outputScaleSlider, scaleValEl);
  bindSlider(normalMixSlider, normalMixValEl);
  bindSlider(highlightMixSlider, highlightMixValEl);
  bindSlider(fadeStrengthSlider, fadeStrengthValEl);
  fadeCurveSlider.addEventListener('input', () => {
    fadeCurveValEl.textContent = (parseInt(fadeCurveSlider.value) / 10).toFixed(1);
  });

  // ---- Aspect ratio lock ----
  function getSourceAspect() {
    if (!sourceImage) return 2;
    return sourceImage.width / sourceImage.height;
  }
  resColsInput.addEventListener('change', () => {
    if (!lockAspectCheck.checked) return;
    const cols = parseInt(resColsInput.value) || 20;
    resRowsInput.value = Math.max(3, Math.round(cols / getSourceAspect() * 0.86));
  });
  resRowsInput.addEventListener('change', () => {
    if (!lockAspectCheck.checked) return;
    const rows = parseInt(resRowsInput.value) || 20;
    resColsInput.value = Math.max(3, Math.round(rows * getSourceAspect() / 0.86));
  });

  // ---- Image upload ----
  $('btnUpload').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      uploadedImg = img;
      imageControls.style.display = '';
      imgOffXInput.value = 0;
      imgOffYInput.value = 0;
      imgScaleSlider.value = 100;
      imgScaleVal.textContent = '100';
      buildSource();
      generate();
    };
    img.src = URL.createObjectURL(file);
  });
  $('btnClearImage').addEventListener('click', () => {
    uploadedImg = null;
    imageControls.style.display = 'none';
    buildSource();
    generate();
  });

  // ---- Build composite source from layers ----
  // Internal working resolution for compositing
  const WORK_W = 800;
  const WORK_H = 600;

  function buildSource() {
    const ctx = sourceCanvas.getContext('2d');
    sourceCanvas.width = WORK_W;
    sourceCanvas.height = WORK_H;

    // White background (non-highlighted)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, WORK_W, WORK_H);

    // Draw image layer
    if (uploadedImg) {
      const s = parseInt(imgScaleSlider.value) / 100;
      const ox = parseInt(imgOffXInput.value) || 0;
      const oy = parseInt(imgOffYInput.value) || 0;
      const dw = uploadedImg.width * s;
      const dh = uploadedImg.height * s;
      // Center the image by default, then apply offset
      const cx = (WORK_W - dw) / 2 + ox;
      const cy = (WORK_H - dh) / 2 + oy;
      ctx.drawImage(uploadedImg, cx, cy, dw, dh);
    }

    // Draw text layer
    if (textLayerEnabled.checked) {
      const text = textLayerInput.value;
      if (text) {
        const fontSize = parseInt(textSizeSlider.value);
        const font = textFontSelect.value;
        const tx = parseInt(textOffXInput.value) || 0;
        const ty = parseInt(textOffYInput.value) || 0;
        ctx.fillStyle = '#000000';
        ctx.font = fontSize + 'px "' + font + '"';
        ctx.textBaseline = 'top';
        const lines = text.split('\n');
        const lineH = fontSize * 1.2;
        // Measure for centering
        let maxW = 0;
        lines.forEach(l => { const m = ctx.measureText(l).width; if (m > maxW) maxW = m; });
        const totalH = lines.length * lineH;
        const startX = (WORK_W - maxW) / 2 + tx;
        const startY = (WORK_H - totalH) / 2 + ty;
        lines.forEach((l, i) => ctx.fillText(l, startX, startY + i * lineH));
      }
    }

    sourceImage = ctx.getImageData(0, 0, WORK_W, WORK_H);

    // Auto-adjust rows if locked
    if (lockAspectCheck.checked) {
      const cols = parseInt(resColsInput.value) || 40;
      resRowsInput.value = Math.max(3, Math.round(cols / (WORK_W / WORK_H) * 0.86));
    }
  }

  // ---- Drag to move image on preview canvas ----
  let dragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragOrigOX = 0, dragOrigOY = 0;

  previewCanvas.addEventListener('mousedown', e => {
    if (!uploadedImg) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragOrigOX = parseInt(imgOffXInput.value) || 0;
    dragOrigOY = parseInt(imgOffYInput.value) || 0;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    // Map pixel drag to source coordinate offset.
    // The preview canvas is displayed scaled, so compute the ratio.
    const rect = previewCanvas.getBoundingClientRect();
    const displayScale = previewCanvas.width / rect.width;
    // Further scale: the source WORK_W maps to the output canvas width
    // Output canvas width = cols * hStep + ..., source = WORK_W
    // Approximate: moving 1 display pixel = displayScale * (WORK_W / canvasWidth) source pixels
    const srcScale = WORK_W / previewCanvas.width;
    const dx = (e.clientX - dragStartX) * displayScale * srcScale;
    const dy = (e.clientY - dragStartY) * displayScale * srcScale;
    imgOffXInput.value = Math.round(dragOrigOX + dx);
    imgOffYInput.value = Math.round(dragOrigOY + dy);
    buildSource();
    debouncedGenerate();
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // ---- Sampling ----
  function isHighlighted(imgData, x, y, threshold, invert) {
    if (x < 0 || y < 0 || x >= imgData.width || y >= imgData.height) return false;
    const ix = Math.floor(x);
    const iy = Math.floor(y);
    const idx = (iy * imgData.width + ix) * 4;
    const gray = 0.299 * imgData.data[idx] + 0.587 * imgData.data[idx + 1] + 0.114 * imgData.data[idx + 2];
    const dark = gray < threshold;
    return invert ? !dark : dark;
  }

  // ---- Seeded random ----
  // ---- Hexagon mask test ----
  // Tests if pixel (px, py) is inside a pointy-top regular hexagon
  // centered at (cx, cy) with circumradius R (center to vertex).
  // Uses cube-coordinate conversion: inside when max(|q|,|r|,|s|) <= 1.
  function insideHexagon(px, py, cx, cy, R) {
    // Pointy-top regular hexagon containment test.
    // Circumradius R = center to vertex distance.
    // Inradius = R * sqrt(3)/2 = center to flat-edge midpoint.
    // Two constraint pairs (using symmetry via abs):
    //   1) |dx| <= inradius  (flat left/right edges)
    //   2) |dx|/sqrt(3) + |dy| <= R  (sloped top/bottom edges)
    const dx = Math.abs(px - cx);
    const dy = Math.abs(py - cy);
    return dx <= R * 0.8660254037844386 &&
           dx * 0.5773502691896258 + dy <= R;
  }

  let seed = 42;
  function resetSeed() { seed = 42; }
  function seededRandom() {
    seed = (seed * 16807) % 2147483647;
    return (seed - 1) / 2147483646;
  }

  // ---- Deterministic spatial hash for fade dithering ----
  // Returns a stable 0..1 value for each grid cell, used instead of random
  // so fade removal is consistent and complete at the edges.
  function spatialHash(col, row) {
    // Large primes for mixing
    let h = col * 374761393 + row * 668265263;
    h = (h ^ (h >>> 13)) * 1274126177;
    h = h ^ (h >>> 16);
    return (h & 0x7fffffff) / 0x7fffffff;
  }

  // ---- Main generation ----
  async function generate(exportScale) {
    if (generating) return;
    if (!sourceImage) buildSource();
    if (!sourceImage) return;

    generating = true;
    statusText.textContent = 'Generating...';
    const scale = exportScale || 1;

    const cols = Math.max(3, parseInt(resColsInput.value) || 40);
    const rows = Math.max(3, parseInt(resRowsInput.value) || 20);
    const canvasShape = canvasShapeSelect.value;
    const padding = parseInt(paddingSlider.value);
    const highlightPadding = parseInt(highlightPaddingSlider.value);
    const threshold = parseInt(thresholdSlider.value);
    const invert = invertInput.checked;
    const normalShapeSetting = normalShapeSelect.value;
    const highlightShapeSetting = highlightShapeSelect.value;
    const normalMixRatio = parseInt(normalMixSlider.value) / 100;
    const highlightMixRatio = parseInt(highlightMixSlider.value) / 100;
    const fadeMode = canvasShape === 'hexagon' ? 'none' : fadeModeSelect.value;
    const fadeStrength = parseInt(fadeStrengthSlider.value) / 100;
    const fadeCurve = parseInt(fadeCurveSlider.value) / 10;
    const fadeEffect = fadeEffectSelect.value;
    const fadeOnlyNormal = fadeOnlyNormalCheck.checked;
    const isTransparent = transparentBg.checked;
    const bgColor = bgColorInput.value;

    const allColors = [...new Set([...normalColorList, ...highlightColorList])];
    const normalTypes = normalShapeSetting === 'mixed' ? ['filled', 'hollow'] :
                        normalShapeSetting === 'filled' ? ['filled'] : ['hollow'];
    const hlTypes = highlightShapeSetting === 'mixed' ? ['filled', 'hollow'] :
                    highlightShapeSetting === 'filled' ? ['filled'] : ['hollow'];
    const typesNeeded = [...new Set([...normalTypes, ...hlTypes])];

    const refAspect = FILLED_ASPECT;
    const targetWidth = 1200;
    const cellH = Math.max(4, Math.round(
      (targetWidth - cols * padding) / (cols * refAspect + refAspect / 2)
    ));
    const cellW = Math.max(4, Math.round(cellH * refAspect));
    const hStep = cellW + padding;
    const vStep = Math.round(cellH * 0.75) + padding;
    const outW = Math.ceil(cols * hStep + cellW / 2 + padding);
    const outH = Math.ceil(rows * vStep + cellH * 0.25 + padding);

    const hlCellH = Math.max(4, cellH - highlightPadding);
    const hlCellW = Math.max(4, Math.round(hlCellH * refAspect));
    const stampW = Math.round(cellW * scale);
    const stampH = Math.round(cellH * scale);
    const hlStampW = Math.round(hlCellW * scale);
    const hlStampH = Math.round(hlCellH * scale);

    const normalStamps = await preloadStamps(typesNeeded, allColors, stampW, stampH);
    const hlStamps = (highlightPadding > 0)
      ? await preloadStamps(typesNeeded, allColors, hlStampW, hlStampH)
      : normalStamps;

    const canvas = (scale === 1) ? previewCanvas : document.createElement('canvas');
    canvas.width = outW * scale;
    canvas.height = outH * scale;
    const ctx = canvas.getContext('2d');

    if (!isTransparent) {
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    const srcW = sourceImage.width;
    const srcH = sourceImage.height;

    // Pre-compute highlight grid
    const hlGrid = new Uint8Array(cols * rows);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * hStep + (r % 2 === 1 ? hStep / 2 : 0);
        const y = r * vStep;
        const sx = ((x + cellW / 2) / (cols * hStep)) * srcW;
        const sy = ((y + cellH / 2) / (rows * vStep)) * srcH;
        hlGrid[r * cols + c] = isHighlighted(sourceImage, sx, sy, threshold, invert) ? 1 : 0;
      }
    }

    // Content-distance BFS
    let distMap = null;
    let maxDist = 1;
    if (fadeMode === 'content' && fadeStrength > 0) {
      distMap = new Float32Array(cols * rows).fill(-1);
      const queue = [];
      for (let i = 0; i < hlGrid.length; i++) {
        if (hlGrid[i]) { distMap[i] = 0; queue.push(i); }
      }
      let qi = 0;
      while (qi < queue.length) {
        const idx = queue[qi++];
        const r = Math.floor(idx / cols), c = idx % cols, d = distMap[idx];
        const odd = r % 2 === 1;
        const nb = [
          [r, c-1], [r, c+1],
          [r-1, odd ? c : c-1], [r-1, odd ? c+1 : c],
          [r+1, odd ? c : c-1], [r+1, odd ? c+1 : c],
        ];
        for (const [nr, nc] of nb) {
          if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
          const ni = nr * cols + nc;
          if (distMap[ni] < 0) { distMap[ni] = d + 1; queue.push(ni); }
        }
      }
      for (let i = 0; i < distMap.length; i++) {
        if (distMap[i] > maxDist) maxDist = distMap[i];
      }
    }

    // Fade: returns 0..1 (1=visible, 0=gone)
    function calcFade(col, row, isHL) {
      if (fadeMode === 'none' || fadeStrength === 0) return 1;
      if (fadeOnlyNormal && isHL) return 1;
      let t;
      if (fadeMode === 'content') {
        if (isHL) return 1;
        const d = distMap[row * cols + col];
        if (d <= 0) return 1;
        t = d / maxDist;
      } else {
        const nx = cols > 1 ? col / (cols - 1) : 0.5;
        const ny = rows > 1 ? row / (rows - 1) : 0.5;
        switch (fadeMode) {
          case 'top':    t = 1 - ny; break;
          case 'bottom': t = ny; break;
          case 'left':   t = 1 - nx; break;
          case 'right':  t = nx; break;
          case 'radial': {
            const dx = nx - 0.5, dy = ny - 0.5;
            t = Math.sqrt(dx * dx + dy * dy) / 0.7071;
            break;
          }
          case 'edges': {
            t = 1 - Math.min(Math.min(nx, 1 - nx), Math.min(ny, 1 - ny)) * 2;
            break;
          }
          default: return 1;
        }
      }
      const fadeStart = 1 - fadeStrength;
      if (t <= fadeStart) return 1;
      const linear = 1 - (t - fadeStart) / (1 - fadeStart);
      // Apply curve exponent: higher values make fade drop off much faster
      return Math.max(0, Math.pow(linear, fadeCurve));
    }

    // Hexagon canvas mask parameters
    const hexCX = outW / 2;
    const hexCY = outH / 2;
    const hexR = Math.min(outW, outH) / 2;

    resetSeed();

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = col * hStep + (row % 2 === 1 ? hStep / 2 : 0);
        const y = row * vStep;

        // Hexagon canvas shape masking: skip cells outside the hex boundary
        if (canvasShape === 'hexagon') {
          const cx = x + cellW / 2;
          const cy = y + cellH / 2;
          if (!insideHexagon(cx, cy, hexCX, hexCY, hexR)) {
            seededRandom(); // consume RNG to keep determinism
            continue;
          }
        }

        const highlighted = !!hlGrid[row * cols + col];

        const colorPool = highlighted ? highlightColorList : normalColorList;
        if (colorPool.length === 0) { seededRandom(); continue; }
        const color = colorPool[Math.floor(seededRandom() * colorPool.length)];

        let shapeType;
        if (highlighted) {
          if (highlightShapeSetting === 'filled') shapeType = 'filled';
          else if (highlightShapeSetting === 'hollow') shapeType = 'hollow';
          else shapeType = seededRandom() < highlightMixRatio ? 'filled' : 'hollow';
        } else {
          if (normalShapeSetting === 'filled') shapeType = 'filled';
          else if (normalShapeSetting === 'hollow') shapeType = 'hollow';
          else shapeType = seededRandom() < normalMixRatio ? 'filled' : 'hollow';
        }

        const fade = calcFade(col, row, highlighted);
        if (fade <= 0) continue;

        // Deterministic skip: use spatial hash so edges are cleanly removed
        if (fadeEffect === 'skip' && fade < 1) {
          if (spatialHash(col, row) > fade) continue;
        }

        const useHL = highlighted && highlightPadding > 0;
        const stampMap = useHL ? hlStamps : normalStamps;
        const stamp = stampMap.get(shapeType + '|' + color);
        if (!stamp) continue;

        let sw = useHL ? hlStampW : stampW;
        let sh = useHL ? hlStampH : stampH;

        if (fadeEffect === 'shrink' && fade < 1) {
          sw = Math.round(sw * fade);
          sh = Math.round(sh * fade);
          if (sw < 1 || sh < 1) continue;
        }

        const dx = x * scale + (stampW - sw) / 2;
        const dy = y * scale + (stampH - sh) / 2;

        if (fadeEffect === 'opacity' && fade < 1) ctx.globalAlpha = fade;
        ctx.drawImage(stamp, dx, dy, sw, sh);
        if (fadeEffect === 'opacity' && fade < 1) ctx.globalAlpha = 1;
      }
    }

    statusText.textContent = 'Generated: ' + outW + 'x' + outH + ' (' + cols + 'x' + rows + ' polygons)';
    generating = false;
    return canvas;
  }

  // ---- Auto-generate ----
  let debounceTimer = null;
  function debouncedGenerate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => generate(), 80);
  }
  function rebuildAndGenerate() {
    buildSource();
    debouncedGenerate();
  }

  // Controls that need source rebuild
  [imgScaleSlider, imgOffXInput, imgOffYInput,
   textLayerEnabled, textLayerInput, textOffXInput, textOffYInput,
   textSizeSlider, textFontSelect
  ].forEach(el => {
    el.addEventListener('input', rebuildAndGenerate);
    el.addEventListener('change', rebuildAndGenerate);
  });

  // Controls that only need re-render
  [thresholdSlider, invertInput,
   normalShapeSelect, normalMixSlider, highlightShapeSelect, highlightMixSlider,
   paddingSlider, highlightPaddingSlider, transparentBg, bgColorInput,
   canvasShapeSelect, resColsInput, resRowsInput,
   fadeModeSelect, fadeStrengthSlider, fadeCurveSlider, fadeEffectSelect, fadeOnlyNormalCheck
  ].forEach(el => {
    el.addEventListener('input', debouncedGenerate);
    el.addEventListener('change', debouncedGenerate);
  });

  $('btnGenerate').addEventListener('click', () => {
    stampCache.clear();
    buildSource();
    generate();
  });

  // ---- Export PNG ----
  $('btnExport').addEventListener('click', async () => {
    buildSource();
    const scale = parseInt(outputScaleSlider.value);
    stampCache.clear();
    const exportCanvas = await generate(scale);
    const link = document.createElement('a');
    link.download = 'polygon-art.png';
    link.href = (scale === 1 ? previewCanvas : exportCanvas).toDataURL('image/png');
    link.click();
    statusText.textContent = 'Exported at ' + scale + 'x scale';
    if (scale !== 1) { stampCache.clear(); generate(); }
  });

  // ---- Export SVG ----
  // Builds a true vector SVG with each polygon as an SVG element.
  // Hollow hex: <polygon> element matching hohl_polygon.svg
  // Filled hex: <path> element matching Frenzelit_Polygon_Flaeche.svg
  $('btnExportSvg').addEventListener('click', () => {
    buildSource();
    if (!sourceImage) return;

    const cols = Math.max(3, parseInt(resColsInput.value) || 40);
    const rows = Math.max(3, parseInt(resRowsInput.value) || 20);
    const padding = parseInt(paddingSlider.value);
    const highlightPadding = parseInt(highlightPaddingSlider.value);
    const threshold = parseInt(thresholdSlider.value);
    const invert = invertInput.checked;
    const normalShapeSetting = normalShapeSelect.value;
    const highlightShapeSetting = highlightShapeSelect.value;
    const normalMixRatio = parseInt(normalMixSlider.value) / 100;
    const highlightMixRatio = parseInt(highlightMixSlider.value) / 100;
    const canvasShape = canvasShapeSelect.value;
    const fadeMode = canvasShape === 'hexagon' ? 'none' : fadeModeSelect.value;
    const fadeStrength = parseInt(fadeStrengthSlider.value) / 100;
    const fadeCurve = parseInt(fadeCurveSlider.value) / 10;
    const fadeEffect = fadeEffectSelect.value;
    const fadeOnlyNormal = fadeOnlyNormalCheck.checked;
    const isTransparent = transparentBg.checked;
    const bgColor = bgColorInput.value;

    const refAspect = FILLED_ASPECT;
    const targetWidth = 1200;
    const cellH = Math.max(4, Math.round(
      (targetWidth - cols * padding) / (cols * refAspect + refAspect / 2)
    ));
    const cellW = Math.max(4, Math.round(cellH * refAspect));
    const hStep = cellW + padding;
    const vStep = Math.round(cellH * 0.75) + padding;
    const outW = Math.ceil(cols * hStep + cellW / 2 + padding);
    const outH = Math.ceil(rows * vStep + cellH * 0.25 + padding);

    const hlCellH = Math.max(4, cellH - highlightPadding);
    const hlCellW = Math.max(4, Math.round(hlCellH * refAspect));

    const srcW = sourceImage.width;
    const srcH = sourceImage.height;

    // Pre-compute highlight grid
    const hlGrid = new Uint8Array(cols * rows);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * hStep + (r % 2 === 1 ? hStep / 2 : 0);
        const y = r * vStep;
        const sx = ((x + cellW / 2) / (cols * hStep)) * srcW;
        const sy = ((y + cellH / 2) / (rows * vStep)) * srcH;
        hlGrid[r * cols + c] = isHighlighted(sourceImage, sx, sy, threshold, invert) ? 1 : 0;
      }
    }

    // Content-distance BFS (same as generate)
    let distMap = null;
    let maxDist = 1;
    if (fadeMode === 'content' && fadeStrength > 0) {
      distMap = new Float32Array(cols * rows).fill(-1);
      const queue = [];
      for (let i = 0; i < hlGrid.length; i++) {
        if (hlGrid[i]) { distMap[i] = 0; queue.push(i); }
      }
      let qi = 0;
      while (qi < queue.length) {
        const idx = queue[qi++];
        const r = Math.floor(idx / cols), c = idx % cols, d = distMap[idx];
        const odd = r % 2 === 1;
        const nb = [
          [r, c-1], [r, c+1],
          [r-1, odd ? c : c-1], [r-1, odd ? c+1 : c],
          [r+1, odd ? c : c-1], [r+1, odd ? c+1 : c],
        ];
        for (const [nr, nc] of nb) {
          if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
          const ni = nr * cols + nc;
          if (distMap[ni] < 0) { distMap[ni] = d + 1; queue.push(ni); }
        }
      }
      for (let i = 0; i < distMap.length; i++) {
        if (distMap[i] > maxDist) maxDist = distMap[i];
      }
    }

    function calcFadeSvg(col, row, isHL) {
      if (fadeMode === 'none' || fadeStrength === 0) return 1;
      if (fadeOnlyNormal && isHL) return 1;
      let t;
      if (fadeMode === 'content') {
        if (isHL) return 1;
        const d = distMap[row * cols + col];
        if (d <= 0) return 1;
        t = d / maxDist;
      } else {
        const nx = cols > 1 ? col / (cols - 1) : 0.5;
        const ny = rows > 1 ? row / (rows - 1) : 0.5;
        switch (fadeMode) {
          case 'top':    t = 1 - ny; break;
          case 'bottom': t = ny; break;
          case 'left':   t = 1 - nx; break;
          case 'right':  t = nx; break;
          case 'radial': {
            const dx = nx - 0.5, dy = ny - 0.5;
            t = Math.sqrt(dx * dx + dy * dy) / 0.7071;
            break;
          }
          case 'edges': {
            t = 1 - Math.min(Math.min(nx, 1 - nx), Math.min(ny, 1 - ny)) * 2;
            break;
          }
          default: return 1;
        }
      }
      const fadeStart = 1 - fadeStrength;
      if (t <= fadeStart) return 1;
      const linear = 1 - (t - fadeStart) / (1 - fadeStart);
      return Math.max(0, Math.pow(linear, fadeCurve));
    }

    // SVG viewBox dimensions for the source shapes
    const HOLLOW_VB_W = 403, HOLLOW_VB_H = 459.9298;
    const FILLED_VB_W = 763.24, FILLED_VB_H = 856.81;

    // Hollow hex polygon points (from hohl_polygon.svg)
    const hollowPoints = '385.5 336.19735 385.5 123.73245 201.5 17.5 17.5 123.73245 17.5 336.19735 201.5 442.4298 385.5 336.19735';
    // Filled hex path (from Frenzelit_Polygon_Flaeche.svg)
    const filledPath = 'M374.2,39.66L47.34,225.23c-6.39,3.63-10.34,10.41-10.34,17.75v368.22c0,7.3,3.9,14.05,10.23,17.69l326.93,188.18c6.34,3.65,14.16,3.63,20.48-.06l321.48-187.75c6.27-3.66,10.12-10.37,10.12-17.63V245.3c0-7.26-3.85-13.97-10.12-17.63L394.58,39.79c-6.28-3.67-14.05-3.72-20.38-.13Z';

    // Build SVG elements
    let elements = '';

    // Background rect
    if (!isTransparent) {
      elements += `  <rect width="${outW}" height="${outH}" fill="${bgColor}"/>\n`;
    }

    // Hexagon canvas mask parameters
    const hexCX = outW / 2;
    const hexCY = outH / 2;
    const hexR = Math.min(outW, outH) / 2;

    resetSeed();

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = col * hStep + (row % 2 === 1 ? hStep / 2 : 0);
        const y = row * vStep;

        // Hexagon canvas shape masking
        if (canvasShape === 'hexagon') {
          const cx = x + cellW / 2;
          const cy = y + cellH / 2;
          if (!insideHexagon(cx, cy, hexCX, hexCY, hexR)) {
            seededRandom();
            continue;
          }
        }

        const highlighted = !!hlGrid[row * cols + col];

        const colorPool = highlighted ? highlightColorList : normalColorList;
        if (colorPool.length === 0) { seededRandom(); continue; }
        const color = colorPool[Math.floor(seededRandom() * colorPool.length)];

        let shapeType;
        if (highlighted) {
          if (highlightShapeSetting === 'filled') shapeType = 'filled';
          else if (highlightShapeSetting === 'hollow') shapeType = 'hollow';
          else shapeType = seededRandom() < highlightMixRatio ? 'filled' : 'hollow';
        } else {
          if (normalShapeSetting === 'filled') shapeType = 'filled';
          else if (normalShapeSetting === 'hollow') shapeType = 'hollow';
          else shapeType = seededRandom() < normalMixRatio ? 'filled' : 'hollow';
        }

        const fade = calcFadeSvg(col, row, highlighted);
        if (fade <= 0) continue;

        if (fadeEffect === 'skip' && fade < 1) {
          if (spatialHash(col, row) > fade) continue;
        }

        const useHL = highlighted && highlightPadding > 0;
        let drawW = useHL ? hlCellW : cellW;
        let drawH = useHL ? hlCellH : cellH;

        if (fadeEffect === 'shrink' && fade < 1) {
          drawW = Math.round(drawW * fade);
          drawH = Math.round(drawH * fade);
          if (drawW < 1 || drawH < 1) continue;
        }

        const opacity = (fadeEffect === 'opacity' && fade < 1) ? fade : 1;

        // Position: center the polygon in its cell
        const dx = x + (cellW - drawW) / 2;
        const dy = y + (cellH - drawH) / 2;

        if (shapeType === 'filled') {
          // Scale the filled path from its viewBox to drawW x drawH
          const sx = drawW / FILLED_VB_W;
          const sy = drawH / FILLED_VB_H;
          elements += `  <path d="${filledPath}" fill="${color}" stroke="${color}" stroke-miterlimit="10" stroke-width="74"`;
          elements += ` transform="translate(${dx.toFixed(2)},${dy.toFixed(2)}) scale(${sx.toFixed(6)},${sy.toFixed(6)})"`;
          if (opacity < 1) elements += ` opacity="${opacity.toFixed(3)}"`;
          elements += `/>\n`;
        } else {
          // Scale the hollow polygon from its viewBox to drawW x drawH
          const sx = drawW / HOLLOW_VB_W;
          const sy = drawH / HOLLOW_VB_H;
          elements += `  <polygon points="${hollowPoints}" fill="none" stroke="${color}" stroke-linecap="round" stroke-linejoin="round" stroke-width="35"`;
          elements += ` transform="translate(${dx.toFixed(2)},${dy.toFixed(2)}) scale(${sx.toFixed(6)},${sy.toFixed(6)})"`;
          if (opacity < 1) elements += ` opacity="${opacity.toFixed(3)}"`;
          elements += `/>\n`;
        }
      }
    }

    const svgDoc = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${outW} ${outH}" width="${outW}" height="${outH}">
${elements}</svg>`;

    const blob = new Blob([svgDoc], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.download = 'polygon-art.svg';
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    statusText.textContent = 'Exported SVG (' + Math.round(blob.size / 1024) + ' KB)';
  });

  // ---- Initial render ----
  buildSource();
  generate();
})();
</script>
</body>
</html>
